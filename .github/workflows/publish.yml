name: Publish NuGet Package

permissions:
  contents: write  # needed to push tags and commits

on:
  push:
    branches:
      - main  # run on merge to main

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # fetch full history for tags

      # Setup Git for committing and tagging
      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Bump preview version
      - name: Bump preview version
        run: |
          CSPROJ=(
          "./Ris.SpriteToolkit/Ris.SpriteToolkit/Ris.SpriteToolkit.csproj"
          "./Ris.SpriteToolkit/Ris.SpriteToolkit.Common/Ris.SpriteToolkit.Common.csproj"
          "./Ris.SpriteToolkit/Ris.Wasm.SpriteToolkit/Ris.Wasm.SpriteToolkit.csproj"
          )
          for CSPROJ in "${CSPROJS[@]}"; do
              echo "Processing $CSPROJ"

              CURRENT_VERSION=$(grep -oP '(?<=<Version>).*?(?=</Version>)' "$CSPROJ")
              PREVIEW_NUMBER=$(echo "$CURRENT_VERSION" | grep -oP '(?<=-preview\.)\d+')
              NEW_PREVIEW_NUMBER=$((PREVIEW_NUMBER + 1))
              NEW_VERSION=$(echo "$CURRENT_VERSION" | sed -E "s/(.*-preview\.)[0-9]+/\1$NEW_PREVIEW_NUMBER/")

              # Update
              sed -i "s#<Version>.*</Version>#<Version>$NEW_VERSION</Version>#g" "$CSPROJ"
              git add "$CSPROJ"
          done

          git commit -m "Bump preview version to $NEW_VERSION" || echo "No changes"
          git push origin main

          echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      # Build
      - name: Build
        run: dotnet build ./Ris.SpriteToolkit/Ris.SpriteToolkit.sln --configuration Release

      # Pack
      - name: Pack
        run: dotnet pack ./Ris.SpriteToolkit/Ris.SpriteToolkit.sln --configuration Release --no-build

      # Find NuGet package
      - name: Find NuGet packages
        id: find_pkgs
        run: |
          mapfile -t packages < <(find ./Ris.SpriteToolkit -name "*.nupkg" ! -name "*symbols*.nupkg")
          if [ ${#packages[@]} -eq 0 ]; then
            echo "Error: No .nupkg files found!"
            exit 1
          fi
          {
            echo "packages<<EOF"
            printf '%s\n' "${packages[@]}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # Publish to NuGet
      - name: Publish all NuGet packages
        run: |
          for PKG in $PACKAGES; do
            echo "Publishing $PKG"
            dotnet nuget push "$PKG" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create and push git tag
        run: |
          git tag "v${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"

      # Create GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Preview ${{ env.VERSION }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            ${{ steps.find_pkgs.outputs.packages }}
          overwrite: true  # equivalent to overwrite_files: true in newer versions
